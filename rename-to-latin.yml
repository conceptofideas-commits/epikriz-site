name: rename-to-latin

on:
  workflow_dispatch:
  push:
    paths:
      - 'mrt/**'
      - 'uzi/**'
      - 'reports/**'

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run transliteration rename
        run: |
          python3 - <<'PY'
          import os, re, sys
          TARGETS = ['mrt','uzi','reports']

          MAP = {
              "а":"a","б":"b","в":"v","г":"h","ґ":"g","д":"d","е":"e","є":"ie","ж":"zh","з":"z",
              "и":"y","і":"i","ї":"i","й":"y","к":"k","л":"l","м":"m","н":"n","о":"o","п":"p",
              "р":"r","с":"s","т":"t","у":"u","ф":"f","х":"kh","ц":"ts","ч":"ch","ш":"sh","щ":"shch",
              "ь":"","ю":"yu","я":"ya",
              "ё":"e","ъ":"","э":"e"
          }
          MAP.update({k.upper(): (v.capitalize() if v else "") for k,v in MAP.items()})

          def translit(name):
              out = ''.join(MAP.get(ch, ch) for ch in name)
              out = out.replace(' ', '-')
              out = re.sub(r'[^A-Za-z0-9._-]', '-', out)
              out = re.sub(r'-{2,}', '-', out).strip('-').lower()
              return out or 'file'

          def safe_rename(src_path, dst_path):
              if src_path == dst_path:
                  return
              base, ext = os.path.splitext(dst_path)
              cand = dst_path
              i = 2
              while os.path.exists(cand):
                  cand = f"{base}-{i}{ext}"
                  i += 1
              os.renames(src_path, cand)

          changed = False
          for target in TARGETS:
              if not os.path.isdir(target):
                  continue
              for root, dirs, files in os.walk(target, topdown=False):
                  # files
                  for f in files:
                      nf = translit(f)
                      if nf != f:
                          src = os.path.join(root, f)
                          dst = os.path.join(root, nf)
                          safe_rename(src, dst)
                          changed = True
                  # dirs
                  for d in dirs:
                      nd = translit(d)
                      if nd != d:
                          src = os.path.join(root, d)
                          dst = os.path.join(root, nd)
                          safe_rename(src, dst)
                          changed = True

          open('.rename-changed','w').write('1' if changed else '0')
          print('changed =', changed)
          PY

      - name: Commit & push (if changes)
        if: hashFiles('.rename-changed') != ''
        uses: EndBug/add-and-commit@v9
        with:
          add: .
          message: 'chore: transliterate filenames to latin (auto)'
          default_author: github_actions
