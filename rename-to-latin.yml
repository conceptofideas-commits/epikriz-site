name: rename-to-latin

on:
  workflow_dispatch:
  push:
    paths:
      - 'mrt/**'
      - 'uzi/**'
      - 'reports/**'

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Transliterate and rename
        run: |
          python3 - <<'PY'
          import os, re
          TARGETS = ['mrt','uzi','reports']
          MAP = {"а":"a","б":"b","в":"v","г":"h","ґ":"g","д":"d","е":"e","є":"ie","ж":"zh","з":"z","и":"y","і":"i","ї":"i","й":"y","к":"k","л":"l","м":"m","н":"n","о":"o","п":"p","р":"r","с":"s","т":"t","у":"u","ф":"f","х":"kh","ц":"ts","ч":"ch","ш":"sh","щ":"shch","ь":"","ю":"yu","я":"ya","ё":"e","ъ":"","э":"e"}
          MAP.update({k.upper(): (v.capitalize() if v else "") for k,v in MAP.items()})
          def tr(s):
              s=''.join(MAP.get(ch,ch) for ch in s)
              s=s.replace(' ','-')
              s=re.sub(r'[^A-Za-z0-9._-]','-',s)
              s=re.sub(r'-{2,}','-',s).strip('-').lower()
              return s or 'file'
          def move(src,dst):
              if src==dst: return
              base,ext=os.path.splitext(dst); i=2; cand=dst
              while os.path.exists(cand):
                  cand=f"{base}-{i}{ext}"; i+=1
              os.renames(src,cand)
          changed=False
          for t in TARGETS:
              if not os.path.isdir(t): continue
              for root,dirs,files in os.walk(t,topdown=False):
                  for f in files:
                      nf=tr(f); 
                      if nf!=f: move(os.path.join(root,f), os.path.join(root,nf)); changed=True
                  for d in dirs:
                      nd=tr(d);
                      if nd!=d: move(os.path.join(root,d), os.path.join(root,nd)); changed=True
          open('.rename-changed','w').write('1' if changed else '0')
          PY

      - name: Commit changes
        if: hashFiles('.rename-changed') != ''
        uses: EndBug/add-and-commit@v9
        with:
          add: .
          message: 'chore: transliterate filenames to latin (auto)'
          default_author: github_actions


