<!-- ====== HERO: Магическая библиотека (Spline) ====== -->
<section class="hero3d" aria-label="Магічна бібліотека — 3D сцена">
  <!-- Подключаем viewer -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer/build/spline-viewer.js"></script>

  <!-- https://my.spline.design/…/scene.splinecode (Export → Public URL) -->
  <spline-viewer
    url="https://my.spline.design/…/scene.splinecode"
    loading="eager"
    events
  ></spline-viewer>

  <!-- Фоновая дымка/градиент + подсказка -->
  <div class="hero3d__overlay">
    <div class="hero3d__hint">Наведiть на книги • На телефонi — торкнiться</div>
    <a class="hero3d__cta" href="#items">Перейти до документiв</a>
  </div>
</section>

<style>
  :root{
    --bg:#050507; --fg:#ECEBFA; --accent:#9EA3FF;
  }
  /* полноэкранный тёмный блок с лёгкой дымкой */
  .hero3d{
    position:relative; height:100vh; width:100%;
    background:
      radial-gradient(140% 120% at 50% 0%, #0b0b12 0%, #07070c 40%, #040409 70%, #000 100%),
      repeating-radial-gradient(80% 60% at 50% 10%, rgba(140,130,255,.05) 0 80px, rgba(0,0,0,.0) 80px 120px);
    overflow:hidden;
  }
  .hero3d spline-viewer{ position:absolute; inset:0; width:100%; height:100%; border:0 }
  /* мягкая виньетка/дымка и элементы интерфейса снизу */
  .hero3d__overlay{
    position:absolute; inset:0;
    display:grid; place-items:end center; pointer-events:none;
    background:linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,.55) 100%);
    padding:22px;
  }
  .hero3d__hint{
    pointer-events:auto;
    color:#CFCBFF; font:500 12px/1.2 system-ui, sans-serif;
    letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px;
    text-shadow:0 0 18px rgba(140,130,255,.35);
  }
  .hero3d__cta{
    pointer-events:auto; display:inline-block;
    padding:10px 16px; border-radius:999px;
    background:rgba(255,255,255,.06); color:var(--fg); text-decoration:none;
    border:1px solid rgba(180,180,255,.28); backdrop-filter:blur(6px);
    transition:transform .18s ease, background .18s ease, border-color .18s ease;
  }
  .hero3d__cta:hover{ transform:translateY(-1px); background:rgba(255,255,255,.1); border-color:rgba(180,180,255,.45) }

  /* если пользователь просит меньше анимаций — скрываем viewer, оставляем фон */
  @media (prefers-reduced-motion: reduce){
    .hero3d spline-viewer{ display:none }
  }
</style>
